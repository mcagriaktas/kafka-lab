############################# KRaft Broker Node Configs #########################
#################################################################################

############################# Socket Server Configs #############################
# Basic KRaft Broker Configs
process.roles=broker
node.id=2

# The address the socket server listens on.
listeners=BROKER://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
advertised.listeners=BROKER://broker2.dahbest.kfn:9092,EXTERNAL://localhost:29092

# KRaft Controller Quorum Mapping
controller.quorum.voters=3001@controller1.dahbest.kfn:9093,3002@controller2.dahbest.kfn:9093,3003@controller3.dahbest.kfn:9093
controller.listener.names=CONTROLLER

# Security Protocol Mapping
listener.security.protocol.map=BROKER:SASL_SSL,CONTROLLER:SASL_SSL,EXTERNAL:SASL_SSL
inter.broker.listener.name=BROKER

############################# Authentication #############################
# SSL settings
ssl.keystore.location=/opt/kafka/config/jks/broker2.keystore.jks
ssl.keystore.password=cagri3541
ssl.key.password=cagri3541
ssl.truststore.location=/opt/kafka/config/jks/broker2.truststore.jks
ssl.truststore.password=cagri3541
ssl.truststore.type=PKCS12

# Enabled mechanisms
sasl.enabled.mechanisms=OAUTHBEARER,SCRAM-SHA-256
sasl.mechanism.inter.broker.protocol=OAUTHBEARER
sasl.mechanism.controller.protocol=OAUTHBEARER

###### BROKER Listener SASL/OAUTHBEARER+SCRAM-SHA-256 Configuration ######
listener.name.broker.sasl.oauthbearer.token.endpoint.url=https://keycloak.dahbest.kfn:8443/realms/master/protocol/openid-connect/token
listener.name.broker.sasl.oauthbearer.jwks.endpoint.url=https://keycloak.dahbest.kfn:8443/realms/master/protocol/openid-connect/certs
listener.name.broker.sasl.oauthbearer.expected.audience=kafka
listener.name.broker.sasl.oauthbearer.sub.claim.name=client_id
listener.name.broker.sasl.oauthbearer.client.credentials.client.id=kafka-broker
listener.name.broker.sasl.oauthbearer.client.credentials.client.secret=bTCgOCh39yrevYCf60yIuo7WH1heozWN
listener.name.broker.oauthbearer.sasl.server.callback.handler.class=org.apache.kafka.common.security.oauthbearer.OAuthBearerValidatorCallbackHandler
listener.name.broker.oauthbearer.sasl.login.callback.handler.class=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler
listener.name.broker.scram-sha-256.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required;

##### CONTROLLER Listener SASL/OAUTHBEARER Configuration ######
listener.name.controller.sasl.oauthbearer.token.endpoint.url=https://keycloak.dahbest.kfn:8443/realms/master/protocol/openid-connect/token
listener.name.controller.sasl.oauthbearer.jwks.endpoint.url=https://keycloak.dahbest.kfn:8443/realms/master/protocol/openid-connect/certs
listener.name.controller.sasl.oauthbearer.expected.audience=kafka
listener.name.controller.sasl.oauthbearer.sub.claim.name=client_id
listener.name.controller.sasl.oauthbearer.client.credentials.client.id=kafka-controller
listener.name.controller.sasl.oauthbearer.client.credentials.client.secret=cTCgOCh39yrevYCf60yIuo7WH1heozWN
listener.name.controller.oauthbearer.sasl.server.callback.handler.class=org.apache.kafka.common.security.oauthbearer.OAuthBearerValidatorCallbackHandler
listener.name.controller.oauthbearer.sasl.login.callback.handler.class=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler

##### EXTERNAL Listener SASL/OAUTHBEARER+SCRAM-SHA-256 Configuration ######
listener.name.external.sasl.oauthbearer.token.endpoint.url=https://keycloak.dahbest.kfn:8443/realms/master/protocol/openid-connect/token
listener.name.external.sasl.oauthbearer.jwks.endpoint.url=https://keycloak.dahbest.kfn:8443/realms/master/protocol/openid-connect/certs
listener.name.external.sasl.oauthbearer.expected.audience=kafka
listener.name.external.sasl.oauthbearer.sub.claim.name=client_id
listener.name.external.oauthbearer.sasl.server.callback.handler.class=org.apache.kafka.common.security.oauthbearer.OAuthBearerValidatorCallbackHandler
listener.name.external.scram-sha-256.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required;

# Authorization
authorizer.class.name=org.apache.kafka.metadata.authorizer.StandardAuthorizer
super.users=User:kafka-broker;User:kafka-admin
allow.everyone.if.no.acl.found=false

############################# Internal Topic Settings  #############################
# Cluster Topics Configs
default.replication.factor=3
num.partitions=3
num.replica.fetchers=3

offsets.topic.replication.factor=3
offsets.topic.num.partitions=50

transaction.state.log.replication.factor=3
transaction.state.log.min.isr=2
transaction.state.log.num.partitions=50

log.retention.hours=24

auto.leader.rebalance.enable=true
leader.imbalance.check.interval.seconds=300

############################# Networks #############################
# Socket buffer settings
socket.receive.buffer.bytes=102400
socket.send.buffer.bytes=102400
socket.request.max.bytes=419430400

# Network settings
replica.socket.receive.buffer.bytes=1048576
replica.socket.timeout.ms=60000
message.max.bytes=419430400
max.request.size=419430400
fetch.max.bytes=419430400
replica.lag.time.max.ms=30000
replica.socket.timeout.ms=30000
request.timeout.ms=30000

############################# Log Basics #############################
# Cluster Metadata and Partitions Segment
log.dirs=/opt/data/partitions
metadata.log.dir=/opt/data/metadata

############################# Group Coordinator Settings #############################
# Disable Outside Auto Create
auto.create.topics.enable=false
delete.topic.enable=false